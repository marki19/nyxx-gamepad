<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>Nyxx Controller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Connection overlay ──────────────────────────── -->
  <div id="overlay" class="overlay">
    <!-- ── Connect screen ── -->
    <div id="screen-connect" class="overlay-card">
      <div class="brand-logo">
        <span class="brand-n">N</span><span class="brand-rest">YXX</span>
      </div>
      <div class="brand-sub">WEB CONTROLLER</div>

      <div class="connect-form">
        <label class="form-label">PC Bridge IP Address</label>
        <input id="inp-ip" class="form-input" type="text"
               inputmode="decimal" placeholder="192.168.x.x"
               autocomplete="off" spellcheck="false" />

        <label class="form-label" style="margin-top:10px">Port</label>
        <input id="inp-port" class="form-input form-input--port" type="number"
               value="5001" min="1" max="65535" />

        <button id="btn-connect" class="btn-connect">CONNECT</button>
      </div>

      <div class="cert-tip">
        <span class="cert-tip-icon">ⓘ</span>
        First time on this device: open
        <span id="cert-link" class="cert-link">https://&lt;ip&gt;:5001</span>
        in your phone browser and tap <em>Advanced → Proceed</em>.
      </div>
    </div>

    <!-- ── Connecting / error screen ── -->
    <div id="screen-status" class="overlay-card hidden">
      <div class="brand-logo">
        <span class="brand-n">N</span><span class="brand-rest">YXX</span>
      </div>
      <div class="brand-sub">WEB CONTROLLER</div>
      <div id="overlay-status" class="overlay-status">Connecting…</div>
      <div id="overlay-detail" class="overlay-detail"></div>
      <div class="status-actions">
        <button id="btn-retry" class="btn-retry hidden">CHANGE IP</button>
        <a id="btn-trust-cert" class="btn-retry btn-trust hidden" target="_blank">TRUST CERTIFICATE</a>
      </div>
    </div>
  </div>

  <!-- ── Main gamepad UI ─────────────────────────────── -->
  <div id="gamepad" class="gamepad hidden">
    <!-- Top safe area: utility bar -->
    <div class="safe-area-top">
      <div class="util-bar">
        <div id="conn-badge" class="conn-badge conn-badge--ok">● P1</div>
      </div>
    </div>

    <!-- Massive Dance Mode UI -->
    <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%;">
      <button id="btn-gyro" class="btn-util" style="font-size: 32px; padding: 40px; border-radius: 20px; width: 80%; max-width: 400px; height: 60%; background: #111; color: #fff; border: 4px solid #333; transition: all 0.2s; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        DANCE MODE: OFF<br><br>
        <span style="font-size: 16px; font-weight: normal; color: #888;">Tap to Start</span>
      </button>
      <button id="btn-calibrate" class="btn-util btn-util--dim hidden" style="margin-top: 20px; padding: 15px 30px;">CALIBRATE</button>
    </div>
  </div><!-- /gamepad -->

  <script src="ws.js"></script>
  <script src="gyro.js"></script>
  <script src="gamepad.js"></script>
</body>
</html>
