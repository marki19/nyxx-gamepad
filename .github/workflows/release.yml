name: Build and Release

on:
  push:
    tags:
      - 'v*' # This triggers the workflow ONLY when you push a tag like "v1.0.0"

permissions:
  contents: write # This gives the robot permission to create the Release page

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Build APK
        working-directory: ./client
        run: gradle assembleDebug
        
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nyxx-Android
          path: client/app/build/outputs/apk/debug/app-debug.apk

  build-server:
    name: Build Windows Server
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Publish Server Executable
        run: dotnet publish server/server.csproj -c Release -o builds -p:UseAppHost=true
        
      - name: Install Inno Setup
        run: choco install innosetup
        
      - name: Compile Setup Installer
        run: iscc installer/installer.iss
        
      - name: Upload Server artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nyxx-Server
          path: builds/NyxxServer_Setup.exe

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-server]
    runs-on: ubuntu-latest
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: Nyxx-Android
          
      - name: Download Server Artifact
        uses: actions/download-artifact@v4
        with:
          name: Nyxx-Server
          
      - name: Rename APK
        run: mv app-debug.apk Nyxx.apk
        
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # This automatically generates your changelog!
          files: |
            Nyxx.apk
            NyxxServer_Setup.exe
